<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" aria-labelledby="title desc" role="img" viewBox="0 0 1600 900"><title id="title">dbskill 动态路由图</title><desc id="desc">用户交付当前信息，dbs 根据上下文选择一个 Skill。Skill 产出结果后，用户的新反馈回到 dbs，重新判断下一步。</desc><defs><filter id="shadow" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="8" flood-color="#0f172a" flood-opacity=".08" stdDeviation="14"/></filter><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#2563eb" d="M 0 0 L 10 5 L 0 10 z"/></marker><style>.title{font:700 36px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#0f172a}.subtitle{font:400 18px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#64748b}.step{font:700 22px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#0f172a}.step-inverse{font:700 24px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#fff}.body,.body-inverse{font:400 18px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#334155}.body-inverse{fill:#dbeafe}.group-title{font:700 17px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#1e3a8a}.chip{font:500 14px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#1e3a8a}.badge,.loop-label{font:700 15px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif;fill:#1d4ed8}.loop-label{font:600 17px -apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,&quot;PingFang SC&quot;,&quot;Microsoft YaHei&quot;,sans-serif}.card{fill:#fff;stroke:#dbe4f0;stroke-width:2;filter:url(#shadow)}.chip-bg,.group{stroke:#bfdbfe}.group{fill:#eff6ff;stroke-width:1.5}.chip-bg{fill:#fff;stroke-width:1}.flow,.loop{fill:none;stroke:#2563eb;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.loop{stroke-dasharray:10 10}</style></defs><rect width="1600" height="900" fill="#f8fafc"/><text x="80" y="70" class="title">dbskill 动态路由</text><text x="80" y="108" class="subtitle">每次只处理当前最关键的一步，下一步由实际结果和用户反馈决定。</text><rect width="285" height="54" x="1235" y="48" fill="#dbeafe" rx="27"/><text x="1377" y="82" class="badge" text-anchor="middle">单步执行・结果驱动</text><rect width="290" height="220" x="80" y="205" class="card" rx="24"/><circle cx="125" cy="250" r="22" fill="#dbeafe"/><text x="125" y="256" class="badge" text-anchor="middle">1</text><text x="160" y="258" class="step">交付当前信息</text><text x="120" y="315" class="body">问题・材料・目标</text><text x="120" y="350" class="body">选择・卡点・新反馈</text><rect width="220" height="30" x="115" y="378" fill="#f1f5f9" rx="15"/><text x="225" y="399" class="subtitle" text-anchor="middle">信息不完整也可以</text><path d="M 370 315 H 455" class="flow"/><rect width="310" height="220" x="470" y="205" fill="#1d4ed8" filter="url(#shadow)" rx="24"/><circle cx="515" cy="250" r="22" fill="#fff" fill-opacity=".16"/><text x="515" y="256" text-anchor="middle" style="font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#fff">2</text><text x="550" y="259" class="step-inverse">/dbs 路由判断</text><text x="515" y="315" class="body-inverse">读取完整上下文</text><text x="515" y="350" class="body-inverse">识别当前最关键任务</text><rect width="220" height="30" x="515" y="377" fill="#fff" fill-opacity=".16" rx="15"/><text x="625" y="398" text-anchor="middle" style="font:700 15px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#fff">只选择 1 个 Skill</text><path d="M 780 315 H 850" class="flow"/><rect width="655" height="570" x="865" y="145" class="card" rx="28"/><circle cx="910" cy="190" r="22" fill="#dbeafe"/><text x="910" y="196" class="badge" text-anchor="middle">3</text><text x="945" y="198" class="step">执行当前 Skill</text><text x="945" y="229" class="subtitle">工具箱提供 25 个专项 Skill，本轮只调用一个。</text><rect width="285" height="190" x="900" y="260" class="group" rx="18"/><text x="922" y="291" class="group-title">判断与行动</text><rect width="112" height="30" x="920" y="307" class="chip-bg" rx="15"/><text x="976" y="327" class="chip" text-anchor="middle">diagnosis</text><rect width="120" height="30" x="1042" y="307" class="chip-bg" rx="15"/><text x="1102" y="327" class="chip" text-anchor="middle">benchmark</text><rect width="118" height="30" x="920" y="347" class="chip-bg" rx="15"/><text x="979" y="367" class="chip" text-anchor="middle">deconstruct</text><rect width="114" height="30" x="1048" y="347" class="chip-bg" rx="15"/><text x="1105" y="367" class="chip" text-anchor="middle">good-question</text><rect width="70" height="30" x="920" y="387" class="chip-bg" rx="15"/><text x="955" y="407" class="chip" text-anchor="middle">goal</text><rect width="65" height="30" x="1000" y="387" class="chip-bg" rx="15"/><text x="1032" y="407" class="chip" text-anchor="middle">action</text><rect width="87" height="30" x="1075" y="387" class="chip-bg" rx="15"/><text x="1118" y="407" class="chip" text-anchor="middle">slowisfast</text><rect width="285" height="245" x="1200" y="260" class="group" rx="18"/><text x="1222" y="291" class="group-title">内容生产</text><rect width="92" height="30" x="1220" y="307" class="chip-bg" rx="15"/><text x="1266" y="327" class="chip" text-anchor="middle">content</text><rect width="55" height="30" x="1322" y="307" class="chip-bg" rx="15"/><text x="1349" y="327" class="chip" text-anchor="middle">hook</text><rect width="78" height="30" x="1387" y="307" class="chip-bg" rx="15"/><text x="1426" y="327" class="chip" text-anchor="middle">xhs-title</text><rect width="82" height="30" x="1220" y="347" class="chip-bg" rx="15"/><text x="1261" y="367" class="chip" text-anchor="middle">ai-check</text><rect width="75" height="30" x="1312" y="347" class="chip-bg" rx="15"/><text x="1349" y="367" class="chip" text-anchor="middle">spread</text><rect width="68" height="30" x="1397" y="347" class="chip-bg" rx="15"/><text x="1431" y="367" class="chip" text-anchor="middle">resonate</text><rect width="110" height="30" x="1220" y="387" class="chip-bg" rx="15"/><text x="1275" y="407" class="chip" text-anchor="middle">script-flow</text><rect width="125" height="30" x="1340" y="387" class="chip-bg" rx="15"/><text x="1402" y="407" class="chip" text-anchor="middle">wechat-html</text><text x="1222" y="462" class="subtitle">从选题到发布，按当前问题进入。</text><rect width="285" height="120" x="900" y="470" class="group" rx="18"/><text x="922" y="501" class="group-title">工程与多端</text><rect width="125" height="30" x="920" y="517" class="chip-bg" rx="15"/><text x="982" y="537" class="chip" text-anchor="middle">content-system</text><rect width="60" height="30" x="1055" y="517" class="chip-bg" rx="15"/><text x="1085" y="537" class="chip" text-anchor="middle">bridge</text><rect width="125" height="28" x="920" y="552" class="chip-bg" rx="14"/><text x="982" y="571" class="chip" text-anchor="middle">agent-migration</text><rect width="285" height="95" x="900" y="605" class="group" rx="18"/><text x="922" y="632" class="group-title">学习与讨论</text><rect width="78" height="24" x="920" y="643" class="chip-bg" rx="12"/><text x="959" y="660" class="chip" text-anchor="middle">learning</text><rect width="82" height="24" x="1008" y="643" class="chip-bg" rx="12"/><text x="1049" y="660" class="chip" text-anchor="middle">chatroom</text><rect width="170" height="22" x="920" y="671" class="chip-bg" rx="11"/><text x="1005" y="687" class="chip" text-anchor="middle">chatroom-austrian</text><rect width="285" height="160" x="1200" y="525" class="group" rx="18"/><text x="1222" y="556" class="group-title">状态与决策</text><rect width="65" height="30" x="1220" y="573" class="chip-bg" rx="15"/><text x="1252" y="593" class="chip" text-anchor="middle">save</text><rect width="75" height="30" x="1295" y="573" class="chip-bg" rx="15"/><text x="1332" y="593" class="chip" text-anchor="middle">restore</text><rect width="85" height="30" x="1380" y="573" class="chip-bg" rx="15"/><text x="1422" y="593" class="chip" text-anchor="middle">report</text><rect width="245" height="30" x="1220" y="613" class="chip-bg" rx="15"/><text x="1342" y="633" class="chip" text-anchor="middle">decision・长期回填</text><path d="M 865 665 C 805 700 770 706 730 706" class="flow"/><rect width="310" height="170" x="420" y="575" class="card" rx="24"/><circle cx="465" cy="620" r="22" fill="#dbeafe"/><text x="465" y="626" class="badge" text-anchor="middle">4</text><text x="500" y="628" class="step">获得当前产出</text><text x="465" y="678" class="body">判断・内容・方案</text><text x="465" y="713" class="body">文件・行动・待验证信号</text><path d="M 420 690 H 225 C 145 690 110 645 110 575 V 455" class="loop"/><rect width="245" height="34" x="122" y="622" fill="#dbeafe" rx="17"/><text x="244" y="645" class="loop-label" text-anchor="middle">新反馈回到 /dbs</text><text x="80" y="840" class="subtitle">循环持续到任务形成可使用的结果；每轮都会重新读取上下文。</text></svg>